<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhito & Tresia Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{background:#faf6f7;color:#444;text-align:center}

/* opening */
.opening{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#c08a95;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
transition:1s;
}

.opening h1{
font-family:'Playfair Display',serif;
font-size:36px;
margin-bottom:20px;
}

.opening button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#c08a95;
font-weight:600;
cursor:pointer;
}

.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1470') center/cover;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1{
font-family:'Playfair Display', serif;
font-size:42px;
}

.section{padding:60px 20px}

.title{
font-family:'Playfair Display', serif;
font-size:28px;
margin-bottom:20px;
color:#c08a95;
}

.countdown{
font-size:22px;
font-weight:600;
color:#c08a95;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
}

.map{
width:100%;
height:300px;
border:none;
border-radius:12px;
}

.rsvp{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.rsvp input,.rsvp textarea{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.rsvp button{
padding:12px;
border:none;
background:#c08a95;
color:white;
border-radius:8px;
cursor:pointer;
}

.music-btn{
position:fixed;
bottom:20px;
right:20px;
background:#c08a95;
color:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
}

footer{
background:#c08a95;
color:white;
padding:25px;
margin-top:30px;
}
</style>
</head>

<body>

<!-- Opening -->
<div class="opening" id="opening">
<h1>Dhito & Tresia</h1>
<p>Undangan Pernikahan</p>
<br>
<button onclick="openInvitation()">Buka Undangan</button>
</div>

<!-- Music -->
<audio id="music" loop playsinline>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7c5f.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<section class="hero">
<h1>Dhito & Tresia</h1>
<p>11 November 2028</p>
</section>

<section class="section">
<div class="title">Save The Date</div>
<div id="countdown" class="countdown"></div>
</section>

<section class="section">
<div class="title">Gallery Prewedding</div>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1529634890524-0d1b7d0c3a3b">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
<img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
<img src="https://images.unsplash.com/photo-1492707892479-7bc8d5a4ee93">
</div>
</section>

<section class="section">
<div class="title">Lokasi</div>
<iframe class="map"
src="https://maps.google.com/maps?q=Tangerang%20Selatan&output=embed">
</iframe>
</section>

<section class="section">
<div class="title">RSVP</div>

<form class="rsvp" onsubmit="sendRSVP(event)">
<input type="text" placeholder="Nama" required>
<input type="number" placeholder="Jumlah Tamu" required>
<textarea placeholder="Ucapan"></textarea>
<button type="submit">Kirim RSVP</button>
</form>

<div id="rsvp-result"></div>

</section>

<button onclick="shareWA()" 
style="padding:12px 20px;border:none;background:#25D366;color:white;border-radius:8px;margin-top:20px">
Share WhatsApp
</button>

<footer>
Dhito & Tresia Wedding © 2028
</footer>

<script>
// ===== FIX AUDIO iPhone =====
function openInvitation(){
const opening = document.getElementById("opening");
opening.style.opacity="0";

setTimeout(()=>{
opening.style.display="none";
},800);

const music = document.getElementById("music");
music.muted = false;
music.play().catch(()=>{
document.addEventListener('touchstart', ()=>{
music.play();
},{once:true});
});
}

// ===== SHARE WHATSAPP =====
function shareWA(){
let text = encodeURIComponent(
"Undangan Pernikahan Dhito & Tresia\n\n11 November 2028\n\nSilakan buka undangan berikut:\n" + window.location.href
);

window.open("https://wa.me/?text="+text,"_blank");
}

// ===== ANIMASI BUNGA JATUH =====
function createFlower(){
const flower = document.createElement("div");
flower.innerHTML="🌸";
flower.style.position="fixed";
flower.style.top="-20px";
flower.style.left=Math.random()*100+"vw";
flower.style.fontSize=(Math.random()*10+15)+"px";
flower.style.opacity=Math.random();
flower.style.animation="fall linear forwards";
flower.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(flower);

setTimeout(()=>{
flower.remove();
},10000);
}

setInterval(createFlower, 500);

// ===== CSS animasi bunga =====
const style = document.createElement('style');
style.innerHTML = `
@keyframes fall {
to {
transform: translateY(110vh) rotate(360deg);
}
}`;
document.head.appendChild(style);

// toggle music
function toggleMusic(){
let music = document.getElementById("music");
if(music.paused){
music.play();
}else{
music.pause();
}
}

// countdown
var countDownDate = new Date("Nov 11, 2028 09:00:00").getTime();

setInterval(function() {
var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days+" Hari "+hours+" Jam "+minutes+" Menit "+seconds+" Detik";
},1000);


// RSVP fake submit
function sendRSVP(e){
e.preventDefault();
document.getElementById("rsvp-result").innerHTML =
"<br><b>Terima kasih atas konfirmasinya ❤️</b>";
}

</script>

</body>
</html>
