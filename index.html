<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
* {
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body {
background:#f9f9f9;
color:#333;
text-align:center;
}

.hero {
height:100vh;
background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1470') center/cover;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.hero h1 {
font-family:'Playfair Display', serif;
font-size:40px;
margin-bottom:10px;
}

.hero p {
font-size:18px;
}

.section {
padding:60px 20px;
background:white;
margin-bottom:10px;
}

.couple {
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.card {
background:#fafafa;
padding:20px;
border-radius:12px;
width:250px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.countdown {
font-size:24px;
font-weight:600;
margin-top:20px;
}

.music-btn {
position:fixed;
bottom:20px;
right:20px;
background:#000;
color:white;
border:none;
border-radius:50%;
width:50px;
height:50px;
cursor:pointer;
}

footer {
padding:30px;
background:#111;
color:white;
}

</style>
</head>

<body>

<!-- Musik -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b7c5f.mp3?filename=wedding-romantic-113997.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<!-- Hero -->
<section class="hero">
<h1>Dhito & Pasangan</h1>
<p>Kami Mengundang Anda ke Pernikahan Kami</p>
</section>

<!-- Couple -->
<section class="section">
<h2>Pasangan Mempelai</h2>
<br>
<div class="couple">
<div class="card">
<h3>Mempelai Pria</h3>
<p>Putra dari Bpk & Ibu</p>
</div>

<div class="card">
<h3>Mempelai Wanita</h3>
<p>Putri dari Bpk & Ibu</p>
</div>
</div>
</section>

<!-- Tanggal -->
<section class="section">
<h2>Save The Date</h2>
<p>20 Desember 2026</p>
<div class="countdown" id="countdown"></div>
</section>

<footer>
<p>Terima kasih atas doa & restunya</p>
</footer>

<script>

// autoplay setelah interaksi
document.body.addEventListener('click', function(){
document.getElementById("music").play();
},{once:true});

function toggleMusic(){
let music = document.getElementById("music");
if(music.paused){
music.play();
}else{
music.pause();
}
}

// countdown
var countDownDate = new Date("Dec 20, 2026 10:00:00").getTime();

var x = setInterval(function() {

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days + " Hari " + hours + " Jam "
+ minutes + " Menit " + seconds + " Detik ";

if (distance < 0) {
clearInterval(x);
document.getElementById("countdown").innerHTML = "Acara Dimulai";
}

}, 1000);

</script>

</body>
</html>
